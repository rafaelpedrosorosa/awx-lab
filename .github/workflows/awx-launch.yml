name: Validate and Launch AWX Job Template

on:
  push:
    branches:
      - main
    paths:
      - 'test.yml'
      - '.github/workflows/awx-launch.yml'
      - 'inventories/**'
      - 'group_vars/**'
      - 'host_vars/**'

jobs:
  validate-and-launch:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Python version
        run: python3 --version

      - name: Install ansible-lint
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible-lint ansible-core

      - name: Run ansible-lint
        run: |
          ansible-lint test.yml

      - name: Test connectivity to AWX
        run: |
          echo "Testing AWX URL..."
          curl -k -I --connect-timeout 10 --max-time 20 "${{ secrets.AWX_URL }}/api/v2/ping/"

      - name: Trigger AWX Job
        run: |
          curl -k -X POST "${{ secrets.AWX_URL }}/api/v2/job_templates/${{ secrets.AWX_JOB_TEMPLATE_ID }}/launch/" \
            -u "${{ secrets.AWX_USER }}:${{ secrets.AWX_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{}'
